<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACDA-Quant 后台管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }
  header {
    background: #1e293b;
    padding: 1rem 2rem;
    border-bottom: 1px solid #334155;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 1.25rem; color: #38bdf8; }
  .container { padding: 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
  .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; flex-wrap: wrap; }
  .tab {
    padding: 0.5rem 1rem;
    border-radius: 0.375rem;
    cursor: pointer;
    background: transparent;
    border: none;
    color: #94a3b8;
    font-size: 0.875rem;
    transition: all 0.2s;
  }
  .tab:hover { color: #e2e8f0; }
  .tab.active { background: #334155; color: #38bdf8; font-weight: 600; }
  .panel { display: none; }
  .panel.active { display: block; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 0.5rem;
    padding: 1.25rem;
  }
  .card-label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .card-value { font-size: 1.75rem; font-weight: 700; color: #e2e8f0; }
  .card-sub { font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; }
  .success { color: #22c55e; }
  .danger { color: #ef4444; }
  .warning { color: #f59e0b; }
  table { width: 100%; border-collapse: collapse; background: #1e293b; border: 1px solid #334155; border-radius: 0.5rem; overflow: hidden; }
  th, td { padding: 0.75rem 1rem; text-align: left; font-size: 0.875rem; }
  th { background: #334155; color: #94a3b8; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
  tr { border-bottom: 1px solid #334155; }
  tr:last-child { border-bottom: none; }
  tr:hover { background: #252f47; }
  .badge {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    border-radius: 9999px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge-free { background: #1e3a2f; color: #4ade80; }
  .badge-pro { background: #1e293b; color: #38bdf8; border: 1px solid #38bdf8; }
  .badge-enterprise { background: #312e81; color: #a78bfa; }
  .badge-paid { background: #1e3a2f; color: #4ade80; }
  .badge-pending { background: #451a03; color: #fbbf24; }
  .badge-failed { background: #450a0a; color: #f87171; }
  .btn {
    padding: 0.375rem 0.75rem;
    border-radius: 0.375rem;
    font-size: 0.75rem;
    border: 1px solid #475569;
    background: transparent;
    color: #e2e8f0;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: #334155; }
  .btn-danger { border-color: #7f1d1d; color: #f87171; }
  .btn-danger:hover { background: #450a0a; }
  .btn-success { border-color: #14532d; color: #4ade80; }
  .btn-success:hover { background: #1e3a2f; }
  .filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .filters input, .filters select {
    padding: 0.5rem 0.75rem;
    border-radius: 0.375rem;
    border: 1px solid #334155;
    background: #1e293b;
    color: #e2e8f0;
    font-size: 0.875rem;
  }
  .pagination { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: center; align-items: center; }
  .pagination button { padding: 0.375rem 0.75rem; }
  .pagination span { font-size: 0.875rem; color: #94a3b8; }
  .loading { text-align: center; padding: 2rem; color: #64748b; }
  .error { text-align: center; padding: 2rem; color: #f87171; }
  .empty { text-align: center; padding: 2rem; color: #64748b; }
  #login-panel { max-width: 400px; margin: 5rem auto; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.875rem; color: #94a3b8; margin-bottom: 0.25rem; }
  .form-group input {
    width: 100%; padding: 0.625rem; border-radius: 0.375rem;
    border: 1px solid #334155; background: #1e293b; color: #e2e8f0;
  }
  .form-group button {
    width: 100%; padding: 0.625rem; border-radius: 0.375rem;
    background: #0ea5e9; color: #fff; border: none; font-weight: 600; cursor: pointer;
  }
  .form-group button:hover { background: #0284c7; }
</style>
</head>
<body>

<div id="app">
  <div id="login-panel" class="card">
    <h2 style="margin-bottom:1rem;color:#38bdf8;">后台管理登录</h2>
    <div class="form-group">
      <label>邮箱</label>
      <input type="email" id="login-email" placeholder="admin@example.com">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="login-password" placeholder="密码">
    </div>
    <div class="form-group">
      <button onclick="doLogin()">登录</button>
    </div>
    <p id="login-error" style="color:#f87171;font-size:0.875rem;margin-top:0.5rem;display:none;"></p>
  </div>
</div>

<script>
const API_BASE = window.location.origin + '/api/v1';
let accessToken = localStorage.getItem('admin_token') || '';

async function api(method, path, body) {
  const opts = {
    method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': accessToken ? `Bearer ${accessToken}` : ''
    },
    credentials: 'include'
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + path, opts);
  if (res.status === 401) {
    localStorage.removeItem('admin_token');
    showLogin();
    throw new Error('未授权');
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: '请求失败' }));
    throw new Error(err.detail || '请求失败');
  }
  return res.json();
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  try {
    const res = await fetch(API_BASE + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password })
    });
    if (!res.ok) throw new Error('登录失败');
    // 验证是否为管理员
    const me = await api('GET', '/auth/me');
    if (!me.is_admin) throw new Error('需要管理员权限');
    errEl.style.display = 'none';
    showDashboard();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }
}

function showLogin() {
  document.getElementById('app').innerHTML = `
    <div id="login-panel" class="card">
      <h2 style="margin-bottom:1rem;color:#38bdf8;">后台管理登录</h2>
      <div class="form-group"><label>邮箱</label><input type="email" id="login-email" placeholder="admin@example.com"></div>
      <div class="form-group"><label>密码</label><input type="password" id="login-password" placeholder="密码"></div>
      <div class="form-group"><button onclick="doLogin()">登录</button></div>
      <p id="login-error" style="color:#f87171;font-size:0.875rem;margin-top:0.5rem;display:none;"></p>
    </div>`;
}

function showDashboard() {
  document.getElementById('app').innerHTML = `
    <header>
      <h1>ACDA-Quant 后台管理</h1>
      <button class="btn" onclick="logout()">退出登录</button>
    </header>
    <div class="container">
      <div class="tabs">
        <div class="tab active" onclick="switchTab('dashboard')">仪表盘</div>
        <div class="tab" onclick="switchTab('users')">用户管理</div>
        <div class="tab" onclick="switchTab('devices')">设备管理</div>
        <div class="tab" onclick="switchTab('subscriptions')">订阅管理</div>
        <div class="tab" onclick="switchTab('payments')">支付订单</div>
        <div class="tab" onclick="switchTab('backtests')">回测监控</div>
      </div>
      <div id="panel-dashboard" class="panel active"></div>
      <div id="panel-users" class="panel"></div>
      <div id="panel-devices" class="panel"></div>
      <div id="panel-subscriptions" class="panel"></div>
      <div id="panel-payments" class="panel"></div>
      <div id="panel-backtests" class="panel"></div>
    </div>`;
  loadDashboard();
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'users') loadUsers();
  if (name === 'devices') loadDevices();
  if (name === 'subscriptions') loadSubscriptions();
  if (name === 'payments') loadPayments();
  if (name === 'backtests') loadBacktests();
}

function logout() {
  fetch(API_BASE + '/auth/logout', { method: 'POST', credentials: 'include' });
  localStorage.removeItem('admin_token');
  showLogin();
}

async function loadDashboard() {
  const el = document.getElementById('panel-dashboard');
  el.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const stats = await api('GET', '/admin/stats');
    el.innerHTML = `
      <div class="cards">
        <div class="card"><div class="card-label">总用户数</div><div class="card-value">${stats.users.total}</div><div class="card-sub">今日新增 ${stats.users.new_today}</div></div>
        <div class="card"><div class="card-label">活跃设备</div><div class="card-value">${stats.devices.active}</div></div>
        <div class="card"><div class="card-label">今日回测</div><div class="card-value">${stats.backtests.today}</div><div class="card-sub">成功率 ${stats.backtests.success_rate}%</div></div>
        <div class="card"><div class="card-label">AI 生成</div><div class="card-value">${stats.ai_generations.today}</div><div class="card-sub">今日</div></div>
        <div class="card"><div class="card-label">总收入</div><div class="card-value">¥${stats.revenue.total_cny.toFixed(2)}</div><div class="card-sub">本月 ¥${stats.revenue.this_month_cny.toFixed(2)}</div></div>
      </div>
      <h3 style="margin:1.5rem 0 0.75rem;color:#94a3b8;font-size:0.875rem;text-transform:uppercase;letter-spacing:0.05em;">订阅分布</h3>
      <div class="cards">
        ${Object.entries(stats.subscriptions).map(([tier, count]) => `
          <div class="card"><div class="card-label">${tier === 'free' ? '免费版' : tier === 'pro' ? '专业版' : '企业版'}</div><div class="card-value">${count}</div></div>
        `).join('')}
      </div>`;
  } catch (e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

let pageState = { users: 0, devices: 0, subscriptions: 0, payments: 0, backtests: 0 };

async function loadUsers() {
  const el = document.getElementById('panel-users');
  el.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const data = await api('GET', `/admin/users?skip=${pageState.users}&limit=20`);
    el.innerHTML = renderTable(data, 'users', [
      { key: 'email', label: '邮箱' },
      { key: 'nickname', label: '昵称' },
      { key: 'tier', label: '套餐', fmt: v => `<span class="badge badge-${v}">${v}</span>` },
      { key: 'is_admin', label: '管理员', fmt: v => v ? '<span class="success">是</span>' : '否' },
      { key: 'created_at', label: '注册时间', fmt: v => v ? new Date(v).toLocaleString() : '-' },
    ], [
      { label: '切换权限', cls: 'btn-success', action: (item) => `api('PUT', '/admin/users/${item.id}/admin').then(loadUsers)` },
      { label: '删除', cls: 'btn-danger', action: (item) => `if(confirm('确定删除?')) api('DELETE', '/admin/users/${item.id}').then(loadUsers)` },
    ]);
  } catch (e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

async function loadDevices() {
  const el = document.getElementById('panel-devices');
  el.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const data = await api('GET', `/admin/devices?skip=${pageState.devices}&limit=20`);
    el.innerHTML = renderTable(data, 'devices', [
      { key: 'user_email', label: '用户' },
      { key: 'device_name', label: '设备名' },
      { key: 'os_type', label: '系统' },
      { key: 'is_active', label: '状态', fmt: v => v ? '<span class="success">活跃</span>' : '<span class="danger">已吊销</span>' },
      { key: 'last_heartbeat_at', label: '最后心跳', fmt: v => v ? new Date(v).toLocaleString() : '-' },
    ], [
      { label: '吊销', cls: 'btn-danger', action: (item) => `if(confirm('确定吊销?')) api('POST', '/admin/devices/${item.id}/revoke').then(loadDevices)` },
    ]);
  } catch (e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

async function loadSubscriptions() {
  const el = document.getElementById('panel-subscriptions');
  el.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const data = await api('GET', `/admin/subscriptions?skip=${pageState.subscriptions}&limit=20`);
    el.innerHTML = renderTable(data, 'subscriptions', [
      { key: 'user_email', label: '用户' },
      { key: 'tier', label: '套餐', fmt: v => `<span class="badge badge-${v}">${v}</span>` },
      { key: 'status', label: '状态' },
      { key: 'expires_at', label: '到期时间', fmt: v => v ? new Date(v).toLocaleDateString() : '永久' },
      { key: 'max_devices', label: '设备数' },
    ], []);
  } catch (e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

async function loadPayments() {
  const el = document.getElementById('panel-payments');
  el.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const data = await api('GET', `/admin/payments?skip=${pageState.payments}&limit=20`);
    el.innerHTML = renderTable(data, 'payments', [
      { key: 'order_no', label: '订单号' },
      { key: 'user_email', label: '用户' },
      { key: 'channel', label: '渠道' },
      { key: 'amount_cents', label: '金额', fmt: v => `¥${(v/100).toFixed(2)}` },
      { key: 'status', label: '状态', fmt: v => `<span class="badge badge-${v}">${v}</span>` },
      { key: 'created_at', label: '创建时间', fmt: v => v ? new Date(v).toLocaleString() : '-' },
    ], [
      { label: '退款', cls: 'btn-danger', action: (item) => `if(confirm('确定退款?')) api('PUT', '/admin/payments/${item.id}/status?status=refunded').then(loadPayments)` },
    ]);
  } catch (e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

async function loadBacktests() {
  const el = document.getElementById('panel-backtests');
  el.innerHTML = '<div class="loading">加载中...</div>';
  try {
    const data = await api('GET', `/admin/backtests?skip=${pageState.backtests}&limit=20`);
    el.innerHTML = renderTable(data, 'backtests', [
      { key: 'status', label: '状态', fmt: v => `<span class="badge badge-${v}">${v}</span>` },
      { key: 'scope', label: '范围' },
      { key: 'symbols', label: '股票', fmt: v => v ? v.slice(0, 3).join(',') + (v.length > 3 ? '...' : '') : '-' },
      { key: 'created_at', label: '创建时间', fmt: v => v ? new Date(v).toLocaleString() : '-' },
      { key: 'error_message', label: '错误', fmt: v => v ? v.slice(0, 30) : '-' },
    ], [
      { label: '删除', cls: 'btn-danger', action: (item) => `if(confirm('确定删除?')) api('DELETE', '/admin/backtests/${item.id}').then(loadBacktests)` },
    ]);
  } catch (e) {
    el.innerHTML = `<div class="error">${e.message}</div>`;
  }
}

function renderTable(data, key, columns, actions) {
  if (!data.items || data.items.length === 0) {
    return '<div class="empty">暂无数据</div>';
  }
  let html = '<table><thead><tr>';
  columns.forEach(c => html += `<th>${c.label}</th>`);
  if (actions.length) html += '<th>操作</th>';
  html += '</tr></thead><tbody>';
  data.items.forEach(item => {
    html += '<tr>';
    columns.forEach(c => {
      const val = item[c.key];
      html += `<td>${c.fmt ? c.fmt(val) : (val !== null && val !== undefined ? val : '-')}</td>`;
    });
    if (actions.length) {
      html += '<td>';
      actions.forEach(a => {
        html += `<button class="btn ${a.cls}" onclick="${a.action(item)}">${a.label}</button> `;
      });
      html += '</td>';
    }
    html += '</tr>';
  });
  html += '</tbody></table>';

  const totalPages = Math.ceil(data.total / data.limit);
  const currentPage = Math.floor(data.skip / data.limit) + 1;
  html += `
    <div class="pagination">
      <button class="btn" onclick="pageState.${key}=Math.max(0,pageState.${key}-20);load${capitalize(key)}()" ${data.skip <= 0 ? 'disabled' : ''}>上一页</button>
      <span>第 ${currentPage} / ${totalPages || 1} 页 (共 ${data.total} 条)</span>
      <button class="btn" onclick="pageState.${key}+=20;load${capitalize(key)}()" ${data.skip + data.limit >= data.total ? 'disabled' : ''}>下一页</button>
    </div>`;
  return html;
}

function capitalize(s) {
  return s.charAt(0).toUpperCase() + s.slice(1);
}

// 初始化
(async () => {
  if (accessToken) {
    try {
      const me = await api('GET', '/auth/me');
      if (me.is_admin) showDashboard();
      else showLogin();
    } catch (e) {
      showLogin();
    }
  } else {
    showLogin();
  }
})();
</script>

</body>
</html>
