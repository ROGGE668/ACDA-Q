# ACDA-Q Rust 部署 - 使用本地编译二进制
services:
  postgres:
    image: postgres:16-alpine
    container_name: quant_postgres
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant123
      POSTGRES_DB: quant_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: quant_timescaledb
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant123
      POSTGRES_DB: quant_market
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_market"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quant_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: quant_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: quant_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:quant123@postgres:5432/quant_db
      SYNC_DATABASE_URL: postgresql://quant:quant123@postgres:5432/quant_db
      TIMESCALE_DATABASE_URL: postgresql://quant:quant123@timescaledb:5432/quant_market
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: 8d7f9a0e1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      BACKTEST_COMMISSION: 0.0003
      BACKTEST_SLIPPAGE: 0.001
      BACKTEST_STAMP_DUTY: 0.0005
      BACKTEST_TRANSFER_FEE: 0.00001
      BACKTEST_RISK_FREE_RATE: 0.02
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:8000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - ./reports:/app/reports
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: quant_worker
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:quant123@postgres:5432/quant_db
      SYNC_DATABASE_URL: postgresql://quant:quant123@postgres:5432/quant_db
      TIMESCALE_DATABASE_URL: postgresql://quant:quant123@timescaledb:5432/quant_market
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: 8d7f9a0e1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9
      BACKTEST_COMMISSION: 0.0003
      BACKTEST_SLIPPAGE: 0.001
      BACKTEST_STAMP_DUTY: 0.0005
      BACKTEST_TRANSFER_FEE: 0.00001
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - ./reports:/app/reports
    command: ["/app/acda-q-server", "--worker"]
    restart: unless-stopped
    healthcheck:
      disable: true

  nginx:
    image: nginx:alpine
    container_name: quant_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.rust-only.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  minio_data: