version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: quant_postgres
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant123
      POSTGRES_DB: quant_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: quant_timescaledb
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant123
      POSTGRES_DB: quant_market
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./database/migrations/timescale:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_market"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quant_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: quant_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quant_api
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:quant123@postgres:5432/quant_db
      SYNC_DATABASE_URL: postgresql://quant:quant123@postgres:5432/quant_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      TIMESCALE_DATABASE_URL: postgresql://quant:quant123@timescaledb:5432/quant_market
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - ./:/app
    command: uvicorn server.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quant_worker
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:quant123@postgres:5432/quant_db
      SYNC_DATABASE_URL: postgresql://quant:quant123@postgres:5432/quant_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      TIMESCALE_DATABASE_URL: postgresql://quant:quant123@timescaledb:5432/quant_market
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - ./:/app
    command: celery -A server.worker.celery_app worker --loglevel=info --concurrency=2
    healthcheck:
      test: ["CMD-SHELL", "celery -A server.worker.celery_app inspect ping -d celery@$$(hostname) -t 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  scheduler:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quant_scheduler
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:quant123@postgres:5432/quant_db
      SYNC_DATABASE_URL: postgresql://quant:quant123@postgres:5432/quant_db
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      TIMESCALE_DATABASE_URL: postgresql://quant:quant123@timescaledb:5432/quant_market
      TUSHARE_TOKEN: ${TUSHARE_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    volumes:
      - ./:/app
    command: python -m server.data.scheduler
    healthcheck:
      disable: true

  nginx:
    image: nginx:alpine
    container_name: quant_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  minio_data:
