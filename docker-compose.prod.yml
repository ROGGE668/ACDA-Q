version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: quant_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-quant_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quant_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quant} -d ${POSTGRES_DB:-quant_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: quant_timescaledb
    environment:
      POSTGRES_USER: ${TIMESCALE_USER:-quant}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD}
      POSTGRES_DB: ${TIMESCALE_DB:-quant_market}
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - quant_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-quant} -d ${TIMESCALE_DB:-quant_market}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quant_redis
    volumes:
      - redis_data:/data
    networks:
      - quant_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quant_api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL}
      TIMESCALE_DATABASE_URL: ${TIMESCALE_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    ports:
      - "8000:8000"
    networks:
      - quant_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    restart: unless-stopped

  worker:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: quant_worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SYNC_DATABASE_URL: ${SYNC_DATABASE_URL}
      TIMESCALE_DATABASE_URL: ${TIMESCALE_DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    networks:
      - quant_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    restart: unless-stopped
    command: celery -A server.worker.celery_app worker --loglevel=info --concurrency=2

volumes:
  postgres_data:
  timescale_data:
  redis_data:

networks:
  quant_net:
    external: true
    name: acda-q_default
